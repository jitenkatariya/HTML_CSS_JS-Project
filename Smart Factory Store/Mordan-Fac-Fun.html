<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Factory Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 min-h-screen p-6">
    <h1 class="text-3xl font-bold text-center mb-6">🛒 Smart Factory Store</h1>

    <!-- Add Product Form -->
    <div class="max-w-xl mx-auto bg-white p-6 rounded-xl shadow mb-6">
      <h2 class="text-xl font-semibold mb-4">➕ Add Product</h2>

      <input
        id="name"
        type="text"
        placeholder="Product Name"
        class="border p-2 rounded w-full mb-2"
      />

      <input
        id="price"
        type="number"
        placeholder="Price"
        class="border p-2 rounded w-full mb-4"
      />

      <button
        onclick="addProduct()"
        class="bg-purple-500 text-white px-4 py-2 rounded w-full hover:bg-purple-600"
      >
        Add Product
      </button>
    </div>

    <!-- Product List -->
    <div id="products" class="grid md:grid-cols-3 gap-6"></div>

    <script src="script.js"></script>
  </body>
</html>
