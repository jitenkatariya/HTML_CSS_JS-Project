<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div
      class="users bg-gray-100 flex items-center justify-center min-h-screen gap-6 flex-wrap"
    >
      <div class="bg-white shadow-lg rounded-2xl p-6 w-80 text-center">
        <!-- Profile Image -->
        <img
          class="w-24 h-24 mx-auto rounded-full border-4 border-blue-500"
          src="https://i.pravatar.cc/150?img=3"
          alt="User Image"
        />

        <!-- Name -->
        <h2 class="text-xl font-semibold mt-4">Jiten Katariya</h2>

        <!-- Role -->
        <p class="text-gray-500 text-sm">MERN Stack Developer</p>

        <!-- Bio -->
        <p class="text-gray-600 mt-3 text-sm">
          Passionate developer learning React, Node.js & building real-world
          projects.
        </p>

        <!-- Buttons -->
        <div class="mt-5 flex justify-center gap-3">
          <button
            class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600"
          >
            Follow
          </button>
          <button
            class="border border-gray-300 px-4 py-2 rounded-lg hover:bg-gray-100"
          >
            Message
          </button>
        </div>
      </div>
    </div>
    <button
      id="refreshBtn"
      class="fixed top-5 right-5 bg-green-500 text-white px-4 py-2 rounded-lg shadow hover:bg-green-600"
    >
      Refresh Users
    </button>
  </body>

  <script src="script.js"></script>
</html>
